<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Results Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c14;
    --surface: #111420;
    --card: #161b2e;
    --border: rgba(120, 140, 200, 0.12);
    --gold: #c9a84c;
    --gold-light: #e6c97a;
    --gold-dim: rgba(201, 168, 76, 0.15);
    --text: #e8eaf6;
    --muted: #7b82a8;
    --accent: #4e7fff;
    --accent-dim: rgba(78, 127, 255, 0.12);
    --green: #4ecca3;
    --green-dim: rgba(78, 204, 163, 0.12);
    --red: #ff6b6b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 0%, rgba(78, 127, 255, 0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 100%, rgba(201, 168, 76, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold-dim);
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 100px;
    padding: 5px 14px 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 10px;
  }

  h1 span {
    color: var(--gold);
    font-style: italic;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Search section */
  .search-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .search-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
  }

  .search-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .id-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }

  .id-input::placeholder { color: rgba(123, 130, 168, 0.4); }

  .id-input:focus {
    border-color: rgba(201, 168, 76, 0.5);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.08);
  }

  .search-btn {
    background: linear-gradient(135deg, #c9a84c, #e6c97a);
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #0a0c14;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    white-space: nowrap;
  }

  .search-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(201, 168, 76, 0.3);
  }

  .search-btn:active { transform: translateY(0); }

  /* Error / hint */
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .error-msg {
    display: none;
    margin-top: 12px;
    color: var(--red);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  /* Results area */
  #results { display: none; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Student profile card */
  .profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  .profile-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(78,127,255,0.4), transparent);
  }

  .avatar {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent-dim), var(--gold-dim));
    border: 1px solid rgba(78, 127, 255, 0.3);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
  }

  .profile-info { flex: 1; min-width: 0; }

  .profile-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .profile-meta {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .meta-chip-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  .meta-chip-dot.gold { background: var(--gold); }

  /* Results heading */
  .results-heading {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-left: 4px;
  }

  /* Paper cards */
  .papers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .paper-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 26px 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .paper-card:hover {
    border-color: rgba(201,168,76,0.25);
    transform: translateY(-2px);
  }

  .paper-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 0 0 18px 18px;
  }

  .paper-card.good::after  { background: linear-gradient(90deg, var(--green), transparent); }
  .paper-card.avg::after   { background: linear-gradient(90deg, var(--accent), transparent); }
  .paper-card.below::after { background: linear-gradient(90deg, var(--red), transparent); }

  .paper-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .paper-no-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .paper-no-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
    color: var(--text);
    margin-top: 2px;
  }

  .rank-badge {
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
  }

  .rank-badge .rank-num {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .rank-badge .rank-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-top: 3px;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .stat-box {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .stat-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
  }

  .stat-val.positive { color: var(--green); }
  .stat-val.neutral  { color: var(--accent); }
  .stat-val.negative { color: var(--red); }

  /* Class avg bar */
  .bar-section { margin-top: 18px; }

  .bar-label-row {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .bar-track {
    height: 5px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill-avg {
    position: absolute;
    top: 0; left: 0; height: 100%;
    background: rgba(78,127,255,0.35);
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .bar-fill-student {
    position: absolute;
    top: 0; left: 0; height: 100%;
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1) 0.1s;
  }

  .bar-fill-student.good    { background: var(--green); }
  .bar-fill-student.neutral { background: var(--accent); }
  .bar-fill-student.bad     { background: var(--red); }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .no-results-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  /* Decorative lines */
  .deco-line {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 40px 0;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .page-wrap { padding: 40px 16px 80px; }
    .search-section { padding: 22px 18px; }
    .input-row { flex-direction: column; }
    .profile-card { padding: 20px; }
    .papers-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

  <div id="results"></div>

</div>

// ─── Stats helpers ────────────────────────────────────────────────────────────
function mean(arr) { return arr.reduce((a,b) => a+b, 0) / arr.length; }

function stddev(arr) {
  const m = mean(arr);
  const variance = arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length;
  return Math.sqrt(variance);
}

function zScore(val, m, sd) {
  if (sd === 0) return 0;
  return (val - m) / sd;
}

// Rank: position when sorted descending (1 = highest). Ties share top rank.
function rank(val, allMarks) {
  const sorted = [...allMarks].sort((a,b) => b - a);
  return sorted.indexOf(val) + 1;
}

// ─── Lookup maps ──────────────────────────────────────────────────────────────
const studentMap = {};
STUDENTS_DATA.forEach(s => studentMap[s.student_id] = s);

// Paper → all marks array
const paperMarksMap = {};
MARKS_DATA.forEach(r => {
  if (!paperMarksMap[r.paper_no]) paperMarksMap[r.paper_no] = [];
  paperMarksMap[r.paper_no].push(r.mark);
});

// Per paper: precompute mean + sd
const paperStats = {};
Object.keys(paperMarksMap).forEach(p => {
  const marks = paperMarksMap[p];
  const m = mean(marks);
  const sd = stddev(marks);
  paperStats[p] = { mean: m, sd, max: Math.max(...marks) };
});

// ─── Search logic ─────────────────────────────────────────────────────────────
function search() {
  const inputEl = document.getElementById('studentId');
  const errorEl = document.getElementById('errorMsg');
  const resultsEl = document.getElementById('results');
  const id = parseInt(inputEl.value.trim());

  errorEl.style.display = 'none';
  resultsEl.style.display = 'none';
  resultsEl.innerHTML = '';

  if (!id) { showError(); return; }

  const student = studentMap[id];
  if (!student) { showError(); return; }

  const studentMarks = MARKS_DATA.filter(r => r.student_id === id);
  if (!studentMarks.length) { showError(); return; }

  // Build HTML
  const initials = student.student_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

  let html = `
    <div class="profile-card">
      <div class="avatar">${initials}</div>
      <div class="profile-info">
        <div class="profile-name">${student.student_name}</div>
        <div class="profile-meta">
          <span class="meta-chip"><span class="meta-chip-dot"></span> ID: ${student.student_id}</span>
          <span class="meta-chip"><span class="meta-chip-dot gold"></span> AL Year: ${student.AL_year}</span>
          <span class="meta-chip"><span class="meta-chip-dot"></span> ${studentMarks.length} Paper${studentMarks.length > 1 ? 's' : ''}</span>
        </div>
      </div>
    </div>
    <p class="results-heading">Paper Results</p>
    <div class="papers-grid">
  `;

  studentMarks.forEach(entry => {
    const p = entry.paper_no;
    const mark = entry.mark;
    const stats = paperStats[p];
    const z = zScore(mark, stats.mean, stats.sd);
    const allMarks = paperMarksMap[p];
    const r = rank(mark, allMarks);
    const total = allMarks.length;
    const pct = (mark / stats.max) * 100;
    const avgPct = (stats.mean / stats.max) * 100;
    const zDisplay = (z >= 0 ? '+' : '') + z.toFixed(3);

    let cardClass = 'avg', zClass = 'neutral', barClass = 'neutral';
    if (z >= 0.5)       { cardClass = 'good';  zClass = 'positive'; barClass = 'good'; }
    else if (z < -0.5)  { cardClass = 'below'; zClass = 'negative'; barClass = 'bad'; }

    html += `
      <div class="paper-card ${cardClass}">
        <div class="paper-header">
          <div>
            <div class="paper-no-label">Paper No.</div>
            <div class="paper-no-value">${p}</div>
          </div>
          <div class="rank-badge">
            <span class="rank-num">${r}<span style="font-size:11px;color:var(--muted)">/${total}</span></span>
            <span class="rank-label">Rank</span>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-lbl">Score</div>
            <div class="stat-val">${mark}</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Class Avg</div>
            <div class="stat-val">${stats.mean.toFixed(2)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-lbl">Z-Score</div>
            <div class="stat-val ${zClass}">${zDisplay}</div>
          </div>
        </div>

        <div class="bar-section">
          <div class="bar-label-row">
            <span>Score vs Class</span>
            <span>${mark} / ${stats.max}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill-avg" style="width:${avgPct}%"></div>
            <div class="bar-fill-student ${barClass}" style="width:0%" data-target="${pct}"></div>
          </div>
          <div class="bar-label-row" style="margin-top:4px">
            <span style="color:rgba(78,127,255,0.6)">▬ avg</span>
            <span>σ = ${stats.sd.toFixed(2)}</span>
          </div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  resultsEl.innerHTML = html;
  resultsEl.style.display = 'block';

  // Animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill-student[data-target]').forEach(el => {
      const target = el.dataset.target;
      setTimeout(() => { el.style.width = target + '%'; }, 100);
    });
  });
}

function showError() {
  document.getElementById('errorMsg').style.display = 'block';
}

// Enter key support
document.getElementById('studentId').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
